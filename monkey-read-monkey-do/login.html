<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MONKEY READ MONKEY DO — ACCESS</title>
<style>
  :root{
    --blue:#352879; --light:#6C5EB5; --red:#9A6759; --green:#9AD284;
  }
  html,body{height:100%;margin:0;}
  body{
    background:var(--light);
    font-family:"C64 Pro Mono","Courier New",monospace;
    -webkit-font-smoothing:none;
  }
  .border{box-sizing:border-box;min-height:100vh;padding:4vmin;background:var(--light);}
  .screen{
    position:relative;box-sizing:border-box;min-height:calc(100vh - 8vmin);
    background:var(--blue);color:var(--light);padding:3.4vmin 4vmin;
    font-size:clamp(13px,2.25vmin,24px);line-height:1.5;text-transform:uppercase;
    text-shadow:0 0 6px rgba(154,140,221,.40);overflow:hidden;
  }
  .screen::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(rgba(0,0,0,.16) 0 1px,transparent 1px 3px);
    mix-blend-mode:multiply;opacity:.5;
  }
  pre{margin:0;font:inherit;white-space:pre-wrap;word-break:break-word;}
  .row{display:flex;align-items:center;gap:0;margin-top:1.2em;}
  input#code{
    background:transparent;border:none;outline:none;color:var(--light);
    font:inherit;text-transform:uppercase;text-shadow:inherit;
    caret-color:transparent;width:22ch;padding:0;
  }
  .cursor{display:inline-block;width:1ch;height:1.12em;background:var(--light);
    vertical-align:-0.16em;animation:blink 1.02s steps(1,end) infinite;}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  .err{color:var(--red);}
  .dim{color:var(--light);opacity:.55;}
</style>
</head>
<body>
  <div class="border"><div class="screen" id="screen">
<pre>    **** COMMODORE 64 BASIC V2 ****

 64K RAM SYSTEM  38911 BASIC BYTES FREE

READY.
LOAD"MONKEY READ MONKEY DO",8,1
SEARCHING FOR MONKEY READ MONKEY DO
LOADING

PROTECTED PROGRAM — ENTER ACCESS CODE:</pre>
    <div class="row"><span>&gt; </span><input id="code" type="password" autocomplete="off" autofocus spellcheck="false"><span class="cursor"></span></div>
<pre id="msg"></pre>
<pre class="dim">PRESS RETURN TO RUN</pre>
  </div></div>
<script>
(function(){
  "use strict";
  var input = document.getElementById('code');
  var msg = document.getElementById('msg');
  function submit(){
    var pw = input.value;
    msg.textContent = "";
    fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'},
                         body: JSON.stringify({password: pw})})
      .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, d:d}; }); })
      .then(function(res){
        if(res.ok && res.d && res.d.ok){
          msg.className = "";
          msg.textContent = "ACCESS GRANTED. RUN.";
          window.location.href = "/";
        } else {
          msg.className = "err";
          msg.textContent = "?ACCESS DENIED  ERROR";
          input.value = "";
          input.focus();
        }
      })
      .catch(function(){
        msg.className = "err";
        msg.textContent = "?DEVICE NOT PRESENT  ERROR";
      });
  }
  input.addEventListener('keydown', function(e){ if(e.key === 'Enter'){ e.preventDefault(); submit(); }});
  document.addEventListener('click', function(){ input.focus(); });
})();
</script>
</body>
</html>
