/* ---------- theme ---------- */
:root{
  --bg:#030309;
  --panel:rgba(10,14,42,.58);
  --panel-deep:rgba(6,8,26,.82);
  --cyan:#00e5ff;
  --magenta:#ff2fd6;
  --violet:#7b5cff;
  --lime:#7dffb2;
  --amber:#ffc95c;
  --ink:#eaf6ff;
  --ink-dim:#8fa8c9;
  --line:rgba(0,229,255,.22);
  --glow-cyan:0 0 8px rgba(0,229,255,.85),0 0 22px rgba(0,229,255,.45),0 0 48px rgba(0,229,255,.22);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Exo 2',system-ui,sans-serif;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
#space{position:fixed;inset:0;z-index:0;display:block}
.vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 50% 46%, transparent 55%, rgba(0,0,5,.55) 100%)}

.stage{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:clamp(10px,2.2vh,28px) clamp(10px,3vw,44px);gap:clamp(10px,2vh,22px)}

/* ---------- masthead ---------- */
.masthead{text-align:center;user-select:none}
.logo{
  font-family:'Orbitron';font-weight:900;letter-spacing:.14em;
  font-size:clamp(26px,4.6vw,58px);line-height:1.05;
  background:linear-gradient(92deg,var(--cyan) 0%,#7ee7ff 22%,var(--violet) 55%,var(--magenta) 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 14px rgba(0,229,255,.40)) drop-shadow(0 0 34px rgba(123,92,255,.30));
  animation:logoflicker 11s linear infinite;
}
@keyframes logoflicker{
  0%,96.6%,97.4%,98.2%,100%{opacity:1}
  97%,97.8%{opacity:.72}
}
.tagline{
  margin-top:6px;font-family:'Orbitron';font-weight:500;font-size:clamp(9px,1.05vw,13px);
  letter-spacing:.52em;text-indent:.52em;color:var(--ink-dim);text-transform:uppercase;
}

/* ---------- board ---------- */
.board-wrap{width:min(1180px,100%);}
.board-scroll{overflow-x:auto;padding:6px;scrollbar-width:thin;scrollbar-color:rgba(0,229,255,.35) transparent}
.board-frame{
  --sweep:0deg;
  position:relative;min-width:720px;border-radius:20px;
  background:var(--panel-deep);
  box-shadow:0 0 0 1px rgba(0,229,255,.14),0 0 40px rgba(0,60,120,.35),inset 0 0 80px rgba(8,12,48,.6);
  padding:clamp(8px,1vw,14px);
  backdrop-filter:blur(6px);
}
/* traveling neon pulse around the board frame */
.board-frame::before{
  content:'';position:absolute;inset:-2px;border-radius:22px;padding:2px;pointer-events:none;
  background:conic-gradient(from var(--sweep),
    transparent 0deg,transparent 288deg,
    rgba(0,229,255,0) 300deg,rgba(0,229,255,.9) 330deg,
    rgba(255,47,214,.95) 348deg,transparent 360deg);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  filter:drop-shadow(0 0 6px rgba(0,229,255,.8));
  animation:sweep 8s linear infinite;
}
@property --sweep{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes sweep{to{--sweep:360deg}}

.board{
  position:relative;display:grid;grid-template-columns:repeat(6,1fr);
  gap:clamp(5px,.6vw,9px);overflow:hidden;border-radius:12px;
}
/* periodic diagonal shimmer across the whole grid */
.board::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(115deg,transparent 42%,rgba(150,235,255,.10) 50%,rgba(255,120,235,.07) 54%,transparent 62%);
  background-size:260% 100%;background-position:130% 0;
  animation:shimmer 9.5s ease-in-out infinite;
}
@keyframes shimmer{
  0%{background-position:130% 0}
  22%{background-position:-130% 0}
  100%{background-position:-130% 0}
}

.cell{
  position:relative;display:flex;align-items:center;justify-content:center;
  border-radius:10px;border:1px solid var(--line);
  background:linear-gradient(160deg,rgba(16,22,64,.72),rgba(8,10,34,.72));
  min-height:clamp(52px,8.2vh,86px);
  cursor:pointer;transition:transform .18s ease,box-shadow .22s ease,border-color .22s ease;
}
.cell.cat{
  min-height:clamp(58px,9vh,92px);cursor:default;
  background:linear-gradient(180deg,rgba(24,18,70,.9),rgba(10,10,40,.9));
  border-color:rgba(123,92,255,.4);
  font-family:'Orbitron';font-weight:700;font-size:clamp(9.5px,1.05vw,14.5px);
  letter-spacing:.12em;text-align:center;text-transform:uppercase;
  color:#cfe4ff;text-shadow:0 0 12px rgba(123,92,255,.65);
  padding:6px 8px;line-height:1.35;
}
/* value rows sweep cyan → violet → magenta down the board */
.cell.val{--c1:#a8f6ff;--c2:#00d4ff;--cg:rgba(0,229,255,.55)}
.cell.val.v2{--c1:#9fdcff;--c2:#3f9dff;--cg:rgba(70,160,255,.55)}
.cell.val.v3{--c1:#c2c2ff;--c2:#7b5cff;--cg:rgba(123,92,255,.55)}
.cell.val.v4{--c1:#eab0ff;--c2:#c44dff;--cg:rgba(196,77,255,.55)}
.cell.val.v5{--c1:#ffa8ef;--c2:#ff2fd6;--cg:rgba(255,47,214,.55)}
.cell.val .amt{
  font-family:'Orbitron';font-weight:700;font-size:clamp(16px,2vw,30px);letter-spacing:.05em;
  background:linear-gradient(180deg,var(--c1),var(--c2) 75%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 10px var(--cg));
  transition:filter .2s ease;
}
.cell.val:hover{transform:translateY(-2px) scale(1.035);border-color:var(--c2);
  box-shadow:0 0 8px var(--cg),0 0 24px var(--cg);z-index:2}
.cell.val:hover .amt{filter:drop-shadow(0 0 16px var(--cg))}
.cell.val.used{cursor:default;border-color:rgba(80,100,150,.12);
  background:linear-gradient(160deg,rgba(8,10,26,.5),rgba(5,6,18,.5))}
.cell.val.used .amt{visibility:hidden}
.cell.val.used:hover{transform:none;box-shadow:none}
/* occasional single-cell neon pulse (JS toggles .ping) */
.cell.val.ping{animation:ping 1.6s ease-out 1}
@keyframes ping{
  0%{box-shadow:0 0 0 0 rgba(0,229,255,0)}
  18%{box-shadow:0 0 14px 2px rgba(0,229,255,.75),inset 0 0 18px rgba(0,229,255,.28);border-color:rgba(160,245,255,.95)}
  100%{box-shadow:0 0 0 0 rgba(0,229,255,0)}
}

/* ---------- podiums ---------- */
.podiums{display:flex;gap:clamp(10px,1.6vw,22px);flex-wrap:wrap;justify-content:center;width:min(1180px,100%)}
.podium{
  --hue:var(--cyan);
  flex:1 1 180px;max-width:280px;border-radius:14px;padding:12px 16px 14px;
  background:var(--panel);border:1px solid rgba(255,255,255,.07);
  border-top:2px solid var(--hue);
  box-shadow:inset 0 14px 34px -22px var(--hue);
  backdrop-filter:blur(5px);text-align:center;
}
.podium.active{box-shadow:inset 0 16px 40px -20px var(--hue),0 0 18px -4px var(--hue)}
.podium .pname{font-family:'Orbitron';font-weight:700;font-size:clamp(11px,1.1vw,14px);
  letter-spacing:.22em;color:var(--ink);text-shadow:0 0 10px var(--hue)}
.podium .pscore{font-family:'Orbitron';font-weight:900;font-size:clamp(20px,2.2vw,30px);
  margin-top:4px;color:var(--hue);text-shadow:0 0 14px var(--hue)}
.podium .pscore.neg{color:#ff5c7a;text-shadow:0 0 14px rgba(255,92,122,.8)}

/* ---------- clue overlay ---------- */
.overlay{position:fixed;inset:0;z-index:10;display:none;align-items:center;justify-content:center;
  background:rgba(2,3,12,.62);backdrop-filter:blur(7px);padding:4vmin}
.overlay.show{display:flex}
.clue-card{
  --sweep:0deg;
  position:relative;width:min(920px,94vw);border-radius:24px;
  background:linear-gradient(165deg,rgba(14,18,56,.96),rgba(6,8,28,.96));
  border:1px solid rgba(0,229,255,.28);
  box-shadow:0 0 60px rgba(0,229,255,.18),0 0 120px rgba(123,92,255,.14),inset 0 0 90px rgba(10,16,60,.8);
  padding:clamp(26px,4.5vw,54px) clamp(22px,5vw,64px);
  text-align:center;transform-origin:center;
}
.clue-card::before{
  content:'';position:absolute;inset:-2px;border-radius:26px;padding:2px;pointer-events:none;
  background:conic-gradient(from var(--sweep),transparent 0deg,transparent 300deg,
    rgba(0,229,255,.85) 332deg,rgba(255,47,214,.9) 350deg,transparent 360deg);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;
  animation:sweep 6s linear infinite;
}
.clue-meta{font-family:'Orbitron';font-weight:700;letter-spacing:.3em;text-transform:uppercase;
  font-size:clamp(10px,1.2vw,14px);color:var(--ink-dim)}
.clue-meta b{color:var(--cyan);text-shadow:0 0 12px rgba(0,229,255,.7)}
.clue-text{
  margin:clamp(18px,3.5vh,34px) 0;font-family:'Exo 2';font-weight:600;
  font-size:clamp(19px,2.8vw,34px);line-height:1.45;text-transform:uppercase;
  letter-spacing:.03em;text-shadow:0 2px 18px rgba(0,0,0,.6);
}
.clue-answer{display:none;margin:0 0 clamp(14px,2.5vh,24px);font-family:'Orbitron';font-weight:700;
  font-size:clamp(15px,2vw,24px);color:var(--lime);text-shadow:0 0 16px rgba(125,255,178,.65);
  letter-spacing:.06em;text-transform:uppercase}
.clue-answer.show{display:block;animation:rise .4s ease}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.btnrow{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn{
  font-family:'Orbitron';font-weight:700;font-size:clamp(11px,1.1vw,14px);letter-spacing:.18em;
  text-transform:uppercase;color:var(--cyan);background:rgba(0,229,255,.06);
  border:1px solid rgba(0,229,255,.5);border-radius:999px;padding:12px 26px;cursor:pointer;
  transition:all .18s ease;
}
.btn:hover{background:rgba(0,229,255,.16);box-shadow:var(--glow-cyan);color:#dffbff}
.btn.magenta{color:var(--magenta);border-color:rgba(255,47,214,.5);background:rgba(255,47,214,.06)}
.btn.magenta:hover{background:rgba(255,47,214,.16);
  box-shadow:0 0 8px rgba(255,47,214,.85),0 0 22px rgba(255,47,214,.45);color:#ffdff6}

.hint{z-index:2;font-size:12px;color:var(--ink-dim);letter-spacing:.08em;text-align:center;opacity:.75}

/* ---------- launch / start overlay ---------- */
@property --p{syntax:'<percentage>';initial-value:0%;inherits:false}
#launch{
  position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:clamp(26px,5vh,54px);
  background:radial-gradient(ellipse 62% 62% at 50% 45%,rgba(10,14,42,.5),rgba(2,3,10,.94));
  -webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);
  cursor:pointer;transition:opacity .7s ease,transform .7s ease;
}
#launch.gone{opacity:0;transform:scale(1.05);pointer-events:none}
#launch .launch-logo{font-size:clamp(30px,6.4vw,76px)}
.charge-ring{position:relative;width:clamp(96px,14vw,144px);aspect-ratio:1}
.charge-ring .core{position:absolute;inset:0;border-radius:50%;
  border:2px solid rgba(0,229,255,.22);box-shadow:inset 0 0 26px rgba(0,229,255,.14)}
.charge-ring .fill{position:absolute;inset:-3px;border-radius:50%;
  background:conic-gradient(from -90deg,var(--cyan) var(--p,0%),transparent 0);
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 7px),#000 calc(100% - 6px));
          mask:radial-gradient(farthest-side,transparent calc(100% - 7px),#000 calc(100% - 6px));
  filter:drop-shadow(0 0 9px var(--cyan));opacity:0}
.charge-ring .bolt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:clamp(30px,4.4vw,48px);color:var(--cyan);
  filter:drop-shadow(0 0 10px var(--cyan));transition:transform .18s ease,color .18s ease,filter .18s ease}
#launch.charging .fill{opacity:1;animation:chargefill 1.05s linear forwards}
#launch.charging .bolt{animation:boltbuzz .08s steps(2,end) infinite}
#launch.discharge .fill{opacity:0;transition:opacity .25s ease}
#launch.discharge .bolt{animation:none;transform:scale(1.55);color:#fff;
  filter:drop-shadow(0 0 24px var(--cyan)) drop-shadow(0 0 46px #fff)}
@keyframes chargefill{from{--p:0%}to{--p:100%}}
@keyframes boltbuzz{0%{transform:translate(-1px,0) scale(1)}100%{transform:translate(1px,-1px) scale(1.06)}}
.launch-prompt{font-family:'Orbitron';font-weight:700;letter-spacing:.34em;text-indent:.34em;
  font-size:clamp(11px,1.4vw,16px);color:var(--ink-dim);text-transform:uppercase;
  animation:promptpulse 1.9s ease-in-out infinite}
#launch.charging .launch-prompt,#launch.discharge .launch-prompt{animation:none;opacity:0;transition:opacity .3s}
@keyframes promptpulse{0%,100%{opacity:.42}50%{opacity:1;color:var(--ink);text-shadow:0 0 12px rgba(0,229,255,.6)}}

@media (prefers-reduced-motion:reduce){
  .board-frame::before,.clue-card::before,.board::after,.logo,
  #launch.charging .fill,#launch.charging .bolt,.launch-prompt{animation:none}
}
</style>
</head>
<body>
<canvas id="space"></canvas>
<div class="vignette"></div>

<div id="launch">
  <div class="logo launch-logo">HYPER&nbsp;JEOPARDY</div>
  <div class="charge-ring">
    <div class="core"></div>
    <div class="fill"></div>
    <div class="bolt">&#9889;</div>
  </div>
  <div class="launch-prompt">Press to Launch</div>
</div>

<div class="stage">
  <header class="masthead">
    <div class="logo">HYPER&nbsp;JEOPARDY</div>
    <div class="tagline">A Central Industrial Game</div>
  </header>

  <div class="board-wrap">
    <div class="board-scroll">
      <div class="board-frame">
        <div class="board" id="board"></div>
      </div>
    </div>
  </div>

  <div class="podiums" id="podiums"></div>
  <div class="hint">Aesthetic preview — click any dollar amount to test the clue reveal. Game logic arrives in phase&nbsp;2.</div>
</div>

<div class="overlay" id="overlay">
  <div class="clue-card" id="clueCard">
    <div class="clue-meta" id="clueMeta"></div>

    <div class="btnrow">
      <button class="btn" id="revealBtn">Reveal Response</button>
      <button class="btn magenta" id="closeBtn">Back to Board</button>
    </div>
  </div>
</div>

<script>
'use strict';
/* ============================================================
   AUDIO — game-start sound effect.
   Primary: plays assets/laser-charge.mp3 (the supplied laser-
   charge clip) in place of the traditional Jeopardy jingle.
   Fallback: if that file isn't present (e.g. this standalone
   preview), a Web Audio "laser charge" is synthesized so the
   launch moment still has a voice. Drop the real mp3 in and it
   takes over automatically — no code change needed.
   ============================================================ */
const AudioFX=(function(){
  const SRC='assets/laser-charge.mp3';
  let fileReady=false, el=null, actx=null;
  try{
    el=new Audio(SRC);el.preload='auto';el.volume=.9;
    el.addEventListener('canplaythrough',()=>{fileReady=true},{once:true});
    el.addEventListener('error',()=>{fileReady=false});
  }catch(e){/* Audio unavailable */}

  function synth(){ // synthesized laser charge-up + discharge
    try{
      actx=actx||new (window.AudioContext||window.webkitAudioContext)();
      if(actx.state==='suspended')actx.resume();
    }catch(e){return}
    const c=actx,t=c.currentTime;
    const master=c.createGain();master.gain.value=.8;master.connect(c.destination);
    // charge whine: two detuned oscillators sweeping up through a rising filter
    const lp=c.createBiquadFilter();lp.type='lowpass';lp.Q.value=7;
    lp.frequency.setValueAtTime(380,t);lp.frequency.exponentialRampToValueAtTime(6200,t+1.0);
    const cg=c.createGain();cg.gain.setValueAtTime(.0001,t);
    cg.gain.exponentialRampToValueAtTime(.34,t+.95);
    cg.gain.exponentialRampToValueAtTime(.0001,t+1.18);
    lp.connect(cg).connect(master);
    [1,1.005].forEach((d,i)=>{
      const o=c.createOscillator();o.type=i?'square':'sawtooth';
      o.frequency.setValueAtTime(110*d,t);
      o.frequency.exponentialRampToValueAtTime(1650*d,t+1.0);
      o.connect(lp);o.start(t);o.stop(t+1.2);
    });
    // discharge zap at ~1.02s: descending tone + filtered noise burst
    const zt=t+1.0;
    const pew=c.createOscillator();pew.type='triangle';
    pew.frequency.setValueAtTime(1850,zt);pew.frequency.exponentialRampToValueAtTime(170,zt+.34);
    const pg=c.createGain();pg.gain.setValueAtTime(.42,zt);pg.gain.exponentialRampToValueAtTime(.0001,zt+.36);
    pew.connect(pg).connect(master);pew.start(zt);pew.stop(zt+.38);
    const nb=c.createBuffer(1,Math.floor(c.sampleRate*.4),c.sampleRate),nd=nb.getChannelData(0);
    for(let i=0;i<nd.length;i++)nd[i]=(Math.random()*2-1)*Math.pow(1-i/nd.length,2);
    const noise=c.createBufferSource();noise.buffer=nb;
    const bp=c.createBiquadFilter();bp.type='bandpass';bp.Q.value=1.1;
    bp.frequency.setValueAtTime(2600,zt);bp.frequency.exponentialRampToValueAtTime(480,zt+.34);
    const ng=c.createGain();ng.gain.setValueAtTime(.55,zt);ng.gain.exponentialRampToValueAtTime(.0001,zt+.38);
    noise.connect(bp).connect(ng).connect(master);noise.start(zt);
  }

  // must be called from a user gesture (browser autoplay policy)
  function charge(){
    if(fileReady){
      try{el.currentTime=0;const p=el.play();if(p)p.catch(synth);return}catch(e){}
    }
    synth();
  }
  return {charge};
})();

/* ============================================================
   STARFIELD ENGINE — twinkling stars, shooting asteroids,
   drifting translucent nebulas. One canvas, one rAF loop.
   ============================================================ */
(function(){
  const canvas=document.getElementById('space');
  const ctx=canvas.getContext('2d');
  const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let W=0,H=0,DPR=1,stars=[],nebulas=[],meteors=[],nextMeteor=0;

  function rand(a,b){return a+Math.random()*(b-a)}

  function makeNebulaSprite(hexA,hexB){
    const s=512,c=document.createElement('canvas');c.width=c.height=s;
    const g=c.getContext('2d');
    let gr=g.createRadialGradient(s*.42,s*.46,10,s*.42,s*.46,s*.5);
    gr.addColorStop(0,hexA);gr.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=gr;g.fillRect(0,0,s,s);
    gr=g.createRadialGradient(s*.62,s*.58,10,s*.62,s*.58,s*.38);
    gr.addColorStop(0,hexB);gr.addColorStop(1,'rgba(0,0,0,0)');
    g.globalCompositeOperation='screen';g.fillStyle=gr;g.fillRect(0,0,s,s);
    return c;
  }

  function init(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    W=innerWidth;H=innerHeight;
    canvas.width=W*DPR;canvas.height=H*DPR;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    const n=Math.round(Math.min(320,(W*H)/5500));
    const tints=['#dff2ff','#cfe0ff','#ffe9d6','#d8fff4','#f4e6ff'];
    stars=Array.from({length:n},()=>({
      x:Math.random()*W,y:Math.random()*H,
      r:rand(.4,1.7),base:rand(.25,.85),amp:rand(.1,.4),
      spd:rand(.4,1.6),ph:rand(0,Math.PI*2),glint:0,
      tint:tints[Math.floor(Math.random()*tints.length)]
    }));
    nebulas=[
      {img:makeNebulaSprite('rgba(123,92,255,0.55)','rgba(0,180,255,0.35)'),
       sc:rand(1.4,1.9),ax:W*.32,ay:H*.22,sx:.021,sy:.014,px:0,   breath:.017,pb:1.2},
      {img:makeNebulaSprite('rgba(255,47,214,0.45)','rgba(123,92,255,0.35)'),
       sc:rand(1.2,1.7),ax:W*.36,ay:H*.26,sx:.016,sy:.023,px:2.2, breath:.013,pb:2.0},
      {img:makeNebulaSprite('rgba(0,229,255,0.4)','rgba(60,255,190,0.22)'),
       sc:rand(1.0,1.5),ax:W*.4, ay:H*.3, sx:.012,sy:.018,px:4.1, breath:.010,pb:4.6},
    ];
  }

  function spawnMeteor(t){
    const rock=Math.random()<0.3;
    const fromLeft=Math.random()<0.5;
    const y0=rand(-H*.1,H*.45);
    const speed=rand(.55,.95)*Math.max(W,H); // px per second
    const ang=rand(.30,.62)*(Math.PI/2)*(fromLeft?1:-1); // diagonal down
    meteors.push({
      x:fromLeft?-60:W+60,y:y0,
      vx:Math.cos(ang)*speed*(fromLeft?1:-1)* (fromLeft?1:1),
      vy:Math.abs(Math.sin(ang))*speed*.55,
      rock,tail:rock?rand(70,120):rand(130,230),born:t
    });
    // fix sign for right-spawned
    const m=meteors[meteors.length-1];
    if(!fromLeft) m.vx=-Math.abs(m.vx);
    nextMeteor=t+rand(6,14);
  }

  function draw(t){
    ctx.clearRect(0,0,W,H);
    // nebulas — drift on slow lissajous paths, breathe in/out of view
    ctx.globalCompositeOperation='screen';
    for(const nb of nebulas){
      const cx=W*.5+nb.ax*Math.sin(t*nb.sx+nb.px);
      const cy=H*.42+nb.ay*Math.sin(t*nb.sy+nb.px*1.7);
      const env=Math.max(0,Math.sin(t*nb.breath+nb.pb)); // fades fully out, floats back in
      ctx.globalAlpha=.24*env;
      const s=Math.max(W,H)*nb.sc;
      ctx.drawImage(nb.img,cx-s/2,cy-s/2,s,s);
    }
    ctx.globalCompositeOperation='source-over';
    // stars
    for(const st of stars){
      let a=st.base+st.amp*Math.sin(t*st.spd+st.ph);
      if(!reduced&&Math.random()<0.00045) st.glint=1;          // intermittent twinkle pop
      if(st.glint>0.02){a=Math.min(1,a+st.glint);st.glint*=0.93}
      ctx.globalAlpha=Math.max(0,Math.min(1,a));
      ctx.fillStyle=st.tint;
      ctx.beginPath();ctx.arc(st.x,st.y,st.r,0,Math.PI*2);ctx.fill();
      if(st.glint>0.25&&st.r>1){ // cross flare on the bigger glinting stars
        ctx.globalAlpha=st.glint*.6;ctx.strokeStyle='#bfeaff';ctx.lineWidth=.7;
        const f=st.r*6*st.glint;
        ctx.beginPath();
        ctx.moveTo(st.x-f,st.y);ctx.lineTo(st.x+f,st.y);
        ctx.moveTo(st.x,st.y-f);ctx.lineTo(st.x,st.y+f);
        ctx.stroke();
      }
    }
    // meteors / asteroids
    if(!reduced&&t>nextMeteor) spawnMeteor(t);
    for(let i=meteors.length-1;i>=0;i--){
      const m=meteors[i];
      m.x+=m.vx/60;m.y+=m.vy/60;
      if(m.x<-300||m.x>W+300||m.y>H+300){meteors.splice(i,1);continue}
      const mag=Math.hypot(m.vx,m.vy),ux=m.vx/mag,uy=m.vy/mag;
      const tx=m.x-ux*m.tail,ty=m.y-uy*m.tail;
      const grad=ctx.createLinearGradient(m.x,m.y,tx,ty);
      if(m.rock){grad.addColorStop(0,'rgba(255,176,96,.85)');grad.addColorStop(1,'rgba(255,80,40,0)')}
      else{grad.addColorStop(0,'rgba(220,246,255,.9)');grad.addColorStop(1,'rgba(120,180,255,0)')}
      ctx.strokeStyle=grad;ctx.lineWidth=m.rock?2.4:1.6;ctx.lineCap='round';
      ctx.globalAlpha=.9;
      ctx.beginPath();ctx.moveTo(m.x,m.y);ctx.lineTo(tx,ty);ctx.stroke();
      // glowing head
      const hg=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,m.rock?7:5);
      hg.addColorStop(0,m.rock?'rgba(255,220,170,.95)':'rgba(255,255,255,.95)');
      hg.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=hg;ctx.beginPath();ctx.arc(m.x,m.y,m.rock?7:5,0,Math.PI*2);ctx.fill();
      if(m.rock){ // small tumbling rock silhouette
        ctx.globalAlpha=.95;ctx.fillStyle='#4a3a33';
        ctx.save();ctx.translate(m.x,m.y);ctx.rotate(t*3+m.born);
        ctx.beginPath();ctx.moveTo(3,0);ctx.lineTo(1.4,2.6);ctx.lineTo(-2.4,1.8);
        ctx.lineTo(-3,-1.2);ctx.lineTo(.6,-2.8);ctx.closePath();ctx.fill();ctx.restore();
      }
    }
    ctx.globalAlpha=1;
  }

  let raf=null;
  function loop(ms){
    draw(ms/1000);
    raf=requestAnimationFrame(loop);
  }
  addEventListener('resize',init);
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){cancelAnimationFrame(raf);raf=null}
    else if(!raf) raf=requestAnimationFrame(loop);
  });
  init();
  if(reduced){draw(1)}else{raf=requestAnimationFrame(loop)}
})();

/* ============================================================
   DEMO BOARD — structure mirrors classic Jeopardy (6 cats × 5
   values). Real game logic ports in here in phase 2.
   ============================================================ */
(function(){
  const CATS=[
    {name:'SPACE ODDITIES',clues:[
      ['This planet spins on its side, rolling around the sun like a barrel','What is Uranus?'],
      ['A teaspoon of this collapsed star would weigh about 4 billion tons','What is a neutron star?'],
      ['This “Great” storm on Jupiter has raged for at least 190 years','What is the Great Red Spot?'],
      ['The Boomerang Nebula is colder than this cosmic afterglow of the Big Bang','What is the cosmic microwave background?'],
      ['Astronomers nicknamed this galaxy-scale void “the Cold Spot” — or blamed it on one of these hypothetical parallel worlds','What is another universe (multiverse)?']]},
    {name:'ROCKET SCIENCE',clues:[
      ['To leave Earth you need to hit this “velocity” of about 11.2 km/s','What is escape velocity?'],
      ['This Soviet craft carried the first human to orbit in 1961','What is Vostok 1?'],
      ['The Saturn V’s first stage burned kerosene and this cryogenic oxidizer','What is liquid oxygen?'],
      ['This orbital maneuver slingshots a probe using a planet’s gravity','What is a gravity assist?'],
      ['The ideal rocket equation bears this Russian schoolteacher’s name','Who is Tsiolkovsky?']]},
    {name:'ALIEN CINEMA',clues:[
      ['“Phone home” was all this wrinkly botanist wanted to do','What is E.T.?'],
      ['In space no one can hear you scream — the tagline of this 1979 film','What is Alien?'],
      ['Amy Adams decodes circular alien ink in this 2016 linguistics thriller','What is Arrival?'],
      ['This 1997 Jodie Foster film was based on a Carl Sagan novel','What is Contact?'],
      ['“Klaatu barada nikto” stops the robot Gort in this 1951 classic','What is The Day the Earth Stood Still?']]},
    {name:'COSMIC HISTORY',clues:[
      ['This astronomer was tried by the Inquisition for backing heliocentrism','Who is Galileo?'],
      ['In 1054, Chinese astronomers logged the supernova that became this crab-shaped nebula','What is the Crab Nebula?'],
      ['Her hidden calculations guided John Glenn’s 1962 orbit','Who is Katherine Johnson?'],
      ['This 1967 treaty says no nation may claim the Moon','What is the Outer Space Treaty?'],
      ['Jocelyn Bell Burnell’s “LGM-1” signal turned out to be the first of these','What is a pulsar?']]},
    {name:'STAR WORDS',clues:[
      ['A star sailor, from the Greek — this job title','What is an astronaut?'],
      ['“Disaster” literally means being under a bad one of these','What is a star?'],
      ['This -ology is the science of the universe’s origin and fate','What is cosmology?'],
      ['A “syzygy” is three celestial bodies doing this','What is lining up (alignment)?'],
      ['The “analemma” is the figure-8 the sun traces if you photograph it at the same time each day for one of these','What is a year?']]},
    {name:'MOONSHOTS',clues:[
      ['Number of humans who have walked on the Moon','What is twelve?'],
      ['This Apollo 11 module remained in orbit while Eagle landed','What is Columbia?'],
      ['The Moon drifts away from Earth about 3.8 of these per year','What are centimeters?'],
      ['This nation landed Chang’e 4 on the lunar far side in 2019','What is China?'],
      ['Apollo 8’s crew read from this book while orbiting the Moon on Christmas Eve 1968','What is Genesis?']]},
  ];
  const VALS=[200,400,600,800,1000];
  const board=document.getElementById('board');

  CATS.forEach(c=>{
    const d=document.createElement('div');
    d.className='cell cat';d.textContent=c.name;board.appendChild(d);
  });
  VALS.forEach((v,row)=>{
    CATS.forEach((c,col)=>{
      const d=document.createElement('div');
      d.className='cell val v'+(row+1);
      d.innerHTML='<span class="amt">$'+v+'</span>';
      d.dataset.cat=col;d.dataset.row=row;
      d.addEventListener('click',()=>openClue(d,c,row,v));
      board.appendChild(d);
    });
  });

  // random single-cell neon ping wandering the grid
  const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(!reduced){
    setInterval(()=>{
      const live=[...board.querySelectorAll('.cell.val:not(.used)')];
      if(!live.length)return;
      const pick=live[Math.floor(Math.random()*live.length)];
      pick.classList.add('ping');
      setTimeout(()=>pick.classList.remove('ping'),1700);
    },3400);
  }

  // clue overlay with zoom-from-cell
  const overlay=document.getElementById('overlay'),
        card=document.getElementById('clueCard'),
        meta=document.getElementById('clueMeta'),
        text=document.getElementById('clueText'),
        ans=document.getElementById('clueAnswer'),
        revealBtn=document.getElementById('revealBtn'),
        closeBtn=document.getElementById('closeBtn');
  let activeCell=null;

  function openClue(cell,cat,row,v){
    if(cell.classList.contains('used'))return;
    activeCell=cell;
    const [clue,answer]=cat.clues[row];
    meta.innerHTML=cat.name+' &nbsp;·&nbsp; <b>$'+v+'</b>';
    text.textContent=clue;
    ans.textContent=answer;ans.classList.remove('show');
    revealBtn.style.display='';
    overlay.classList.add('show');
    // FLIP zoom from the clicked cell
    const r=cell.getBoundingClientRect(),cr=card.getBoundingClientRect();
    const dx=(r.left+r.width/2)-(cr.left+cr.width/2);
    const dy=(r.top+r.height/2)-(cr.top+cr.height/2);
    card.style.transition='none';
    card.style.transform='translate('+dx+'px,'+dy+'px) scale('+(r.width/cr.width)+','+(r.height/cr.height)+')';
    card.style.opacity='.4';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      card.style.transition='transform .42s cubic-bezier(.22,1.1,.36,1),opacity .3s ease';
      card.style.transform='none';card.style.opacity='1';
    }));
  }
  revealBtn.addEventListener('click',()=>{ans.classList.add('show');revealBtn.style.display='none'});
  function close(){
    overlay.classList.remove('show');
    if(activeCell){activeCell.classList.add('used');activeCell=null}
  }
  closeBtn.addEventListener('click',close);
  overlay.addEventListener('click',e=>{if(e.target===overlay)close()});
  document.addEventListener('keydown',e=>{if(e.key==='Escape'&&overlay.classList.contains('show'))close()});

  // #clue hash auto-opens a clue (handy for screenshot/QA)
  if(location.hash.includes('clue')){
    setTimeout(()=>{
      const c=board.querySelector('.cell.val.v3[data-cat="2"]');
      if(c)c.click();
      if(location.hash.includes('answer'))setTimeout(()=>revealBtn.click(),700);
    },500);
  }

  // demo podiums
  const players=[
    {name:'NOVA',score:1200,hue:'#00e5ff',active:true},
    {name:'QUASAR',score:800,hue:'#ff2fd6'},
    {name:'PULSAR',score:-200,hue:'#7b5cff'},
  ];
  const rail=document.getElementById('podiums');
  players.forEach(p=>{
    const d=document.createElement('div');
    d.className='podium'+(p.active?' active':'');
    d.style.setProperty('--hue',p.hue);
    d.innerHTML='<div class="pname">'+p.name+'</div>'+
      '<div class="pscore'+(p.score<0?' neg':'')+'">'+(p.score<0?'−$'+Math.abs(p.score):'$'+p.score)+'</div>';
    rail.appendChild(d);
  });
})();

/* ============================================================
   LAUNCH — the game-start moment. Doubles as the required
   user gesture so the start sound is allowed to play, and
   replaces the traditional Jeopardy opening jingle with the
   laser-charge cue.
   ============================================================ */
(function(){
  const launch=document.getElementById('launch');
  const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
  let started=false;
  function go(){
    if(started)return;started=true;
    AudioFX.charge();
    if(reduced){launch.classList.add('gone');setTimeout(()=>launch.remove(),700);return;}
    launch.classList.add('charging');
    setTimeout(()=>launch.classList.add('discharge'),1000); // discharge flash on the zap
    setTimeout(()=>launch.classList.add('gone'),1260);      // wipe overlay away
    setTimeout(()=>launch.remove(),2000);
  }
  launch.addEventListener('click',go);
  launch.addEventListener('touchstart',e=>{e.preventDefault();go();},{passive:false});
  if(location.hash.includes('auto'))setTimeout(go,250); // QA: skip straight into the board
  document.addEventListener('keydown',e=>{
    if(!started&&(e.key===' '||e.key==='Enter'||e.key==='Spacebar')){e.preventDefault();go();}
  });
})();
</script>
