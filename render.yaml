# Central Industrial — Render Blueprint.
#
# Two cloud services: the C64 hub (front door) and Deep Research.
#   • Monkey Read Monkey Do is intentionally NOT deployed here — it runs on a local
#     GPU box so audio never leaves the machine. The hub links to it as a LOCAL tool.
#   • Home Assistant was dropped (it was a Windows/WSL2 launcher, not portable).
#
# Deploy: push this repo to GitHub → in Render: New → Blueprint → select the repo.
# After the first deploy:
#   1. Set ANTHROPIC_API_KEY (and any optional keys) on the deep-research service.
#   2. Set HUB_URL_MONKEYREADMONKEYDO on the hub to your local/Tailscale MRMD URL.

services:
  # ── Deep Research — headless browser-driven research (Docker + Chromium) ─────
  - type: web
    name: deep-research
    runtime: docker
    rootDir: deep-research
    dockerfilePath: ./Dockerfile
    plan: standard            # Chromium needs RAM; 'starter' (512MB) can OOM on heavy pages
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false           # secret — set in the Render dashboard
      - key: DRT_HEADED
        value: "0"            # headless in the cloud
      - key: DRT_BROWSER_CHANNEL
        value: ""             # use Playwright's bundled Chromium (no "chrome" channel)
      - key: DRT_EXA
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      # "← Special Projects" back-link → the hub's public URL.
      - key: HUB_URL
        fromService:
          type: web
          name: central-industrial-hub
          property: host

  # ── Central Industrial hub — C64 landing page (stdlib Python, no deps) ───────
  - type: web
    name: central-industrial-hub
    runtime: python
    rootDir: hub
    plan: starter
    startCommand: python hub_server.py
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      # Auto-inject Deep Research's deployed hostname (the hub prepends https://).
      - key: HUB_URL_DEEP_RESEARCH
        fromService:
          type: web
          name: deep-research
          property: host
      # Monkey Read Monkey Do is local-only → set this to your local/Tailscale URL.
      - key: HUB_URL_MONKEYREADMONKEYDO
        sync: false
