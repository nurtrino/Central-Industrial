# Central Industrial — Render Blueprint.
#
# Three web services under the apex domain centralindustrial.ai, behind one access
# gate (single sign-on via a shared cookie scoped to .centralindustrial.ai):
#   • central-industrial-hub   → centralindustrial.ai (+ www)   — C64 home / login
#   • deep-research            → research.centralindustrial.ai
#   • monkey-read-monkey-do    → notes.centralindustrial.ai     — hosted UI; transcription
#                                                                  runs on a LOCAL GPU worker
# Home Assistant was dropped (Windows/WSL2 launcher, not portable). The GPU worker
# (mrmd-worker/) is NOT deployed here — it runs on the home machine behind a tunnel.
#
# NOTE: the live services were created via the Render API; this file is the canonical
# reference / re-deploy Blueprint. AUTH_SECRET is shared across all three via an env
# var group so the cookie signed by the hub is trusted by every tool. ACCESS_CODE
# (the password) and the API keys are secrets set in the dashboard.

envVarGroups:
  - name: central-industrial-auth
    envVars:
      - key: AUTH_SECRET          # shared HMAC key — signs/verifies the SSO cookie
        generateValue: true

services:
  # ── Central Industrial hub — C64 home page + access gate (stdlib Python) ─────
  - type: web
    name: central-industrial-hub
    runtime: python
    rootDir: hub
    plan: starter
    startCommand: python hub_server.py
    healthCheckPath: /
    autoDeploy: true
    domains:
      - centralindustrial.ai
      - www.centralindustrial.ai
    envVars:
      - fromGroup: central-industrial-auth
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: ACCESS_CODE          # the C64 access code (secret)
        sync: false
      - key: COOKIE_DOMAIN        # share the auth cookie across all subdomains
        value: .centralindustrial.ai
      - key: HUB_URL_DEEP_RESEARCH
        value: https://research.centralindustrial.ai
      - key: HUB_URL_MONKEYREADMONKEYDO
        value: https://notes.centralindustrial.ai

  # ── Deep Research — headless browser-driven research (Docker + Chromium) ─────
  - type: web
    name: deep-research
    runtime: docker
    rootDir: deep-research
    dockerfilePath: ./Dockerfile
    plan: standard              # Chromium needs RAM; 'starter' (512MB) can OOM
    healthCheckPath: /api/health
    autoDeploy: true
    domains:
      - research.centralindustrial.ai
    envVars:
      - fromGroup: central-industrial-auth
      - key: HOME_URL           # redirect target when not logged in
        value: https://centralindustrial.ai
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DRT_HEADED
        value: "0"
      - key: DRT_BROWSER_CHANNEL
        value: ""
      - key: DRT_EXA
        sync: false
      - key: EXA_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false

  # ── WedgeQuest — multiplayer wheel-of-wedges trivia (FastAPI + WebSockets) ───
  # Deliberately NOT behind the auth gate: guests join games from their own
  # phones with a 4-letter room code and shouldn't need the suite access code.
  # Rooms live in process memory → keep this at a single instance.
  - type: web
    name: wedgequest
    runtime: python
    rootDir: trivia
    plan: starter
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    autoDeploy: true
    domains:
      - trivia.centralindustrial.ai
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"

  # ── Monkey Read Monkey Do — hosted UI (Python; transcription on local worker) ─
  - type: web
    name: monkey-read-monkey-do
    runtime: python
    rootDir: monkey-read-monkey-do
    plan: starter
    startCommand: gunicorn --workers 1 --threads 8 --timeout 300 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /healthz
    autoDeploy: true
    domains:
      - notes.centralindustrial.ai
    envVars:
      - fromGroup: central-industrial-auth
      - key: HOME_URL
        value: https://centralindustrial.ai
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: MRMD_HOSTED
        value: "1"
      - key: ANTHROPIC_API_KEY
        sync: false                # Claude API for the notes step
      - key: MRMD_WORKER_URL
        sync: false                # your local GPU worker's HTTPS tunnel URL
      - key: MRMD_WORKER_TOKEN
        sync: false                # MUST match the worker's MRMD_WORKER_TOKEN
