<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<!-- Esri-Leaflet: lets us render ODNR's huge karst MapServer (46,789 points + region polygons) server-side -->
<script src="https://unpkg.com/esri-leaflet@3.0.12/dist/esri-leaflet.js"></script>
<script>
/* ------------------------------------------------------------------ *
 * Caves of Ohio — Location Investigation
 * Anchors transcribed from §6 of the working dossier (OH Caves.md).
 * 11 coordinate-bearing anchors are exact; Trimmer Arch, Mustapha
 * Island, and the Shoemaker lead are county/landmark approximations
 * and are FLAGGED (dashed markers), because the dossier gives only a
 * county or a road for them — never a point.
 * Public-land overlays load at runtime: Wayne NF (USFS) and Ohio
 * State Forests (ODNR) frame the documented/permitted candidates,
 * vs. the crew's secret caves, which are on PRIVATE land by design.
 * ------------------------------------------------------------------ */

const points = [
  { name:"Logan (crew home base)", lat:39.5403, lng:-82.4071, county:"Hocking", bedrock:"—",
    role:"Operational center — Justin's Hocking Hills Adventure Trek & Lutra Adventures HQ. The single strongest geographic anchor in the dossier.",
    cat:"home" },

  { name:"Rock House", lat:39.4983, lng:-82.6171, county:"Hocking", bedrock:"Black Hand Sandstone",
    role:"Hocking core cluster (also Saltpetre Cave, Old Man's Pantry, Surprise/Annex/Three-Hole arches). The type-site 'rock house' recess cave.",
    cat:"hocking" },
  { name:"Rockbridge", lat:39.5663, lng:-82.4994, county:"Hocking", bedrock:"Black Hand Sandstone",
    role:"Ohio's longest natural bridge (92 ft); north end of the corridor.", cat:"hocking" },
  { name:"Balcony Natural Bridge", lat:39.4283, lng:-82.5656, county:"Hocking", bedrock:"Black Hand Sandstone",
    role:"Hocking cluster.", cat:"hocking" },
  { name:"Unger Hollow Arch", lat:39.4542, lng:-82.5454, county:"Hocking", bedrock:"Black Hand Sandstone",
    role:"Hocking cluster.", cat:"hocking" },
  { name:"Old Man's Pantry", lat:39.4350, lng:-82.5404, county:"Hocking", bedrock:"Black Hand Sandstone",
    role:"Hocking cluster.", cat:"hocking" },

  { name:"Lake Katharine", lat:39.0833, lng:-82.6715, county:"Jackson", bedrock:"Sharon Formation",
    role:"Southern reach (Lake Katharine Arch, Peephole Arch).", cat:"southern" },

  { name:"Irish Run Natural Bridge", lat:39.5144, lng:-81.1808, county:"Washington", bedrock:"Permian sandstone",
    role:"STRONGEST Episode-7 candidate — arch + 'the Great Cave' on one Wayne NF (Archers Fork) trail. Matches the honeycombed-cliffside labyrinth.",
    cat:"river", strong:true },
  { name:"Ladd Natural Bridge", lat:39.3117, lng:-81.8196, county:"Washington", bedrock:"Permian sandstone",
    role:"River-country arch belt (permit-only).", cat:"river" },
  { name:"Raven Rock", lat:38.7187, lng:-83.0547, county:"Scioto", bedrock:"Mississippian sandstone",
    role:"Alternate Episode-7 candidate (bluff 500 ft above the Ohio River).", cat:"river" },

  { name:"Fort Hill (Natural Y / Keyhole / Spring Creek)", lat:39.1230, lng:-83.3961, county:"Highland", bedrock:"Peebles Dolomite",
    role:"SW karst ALTERNATIVE for the wet caves (7 arches in Baker Fork gorge). Lower-probability hypothesis.", cat:"karst" },

  { name:"Trimmer Arch", lat:39.34, lng:-83.10, county:"Ross", bedrock:"Greenfield Dolomite",
    role:"Western edge of the corridor (exact location not yet pinned / permit).", cat:"approx", approx:true },
  { name:"Mineral / Mustapha Island Bridge", lat:39.32, lng:-81.90, county:"Athens", bedrock:"sandstone",
    role:"Athens-county arches (Mustapha Is. on OH-124).", cat:"approx", approx:true },

  { name:"Shoemaker / Eagle Township lead", lat:39.37, lng:-82.58, county:"Vinton", bedrock:"Black Hand Sandstone",
    role:"'E. Shoemaker / 1869' signature lead. Eagle Twp = NW corner of Vinton, on the Hocking–Ross–Vinton tri-corner just south of Logan. Click the orange button (top-right) for the records workflow.",
    cat:"lead", approx:true }
];

// Video-series anchor points (Source: Jaeck Caves) — all one color; the layer
// menu still lists each sub-cluster separately. Home base is drawn larger.
const JAECK = "#1565c0";
const cats = {
  home:    { label:"🔵 Logan home base",            color:JAECK, radius:10 },
  hocking: { label:"🔵 Hocking core cluster",       color:JAECK, radius:7 },
  southern:{ label:"🔵 Southern reach",             color:JAECK, radius:7 },
  river:   { label:"🔵 Episode-7 river candidates", color:JAECK, radius:7 },
  karst:   { label:"🔵 Fort Hill SW-karst alt.",    color:JAECK, radius:7 },
  approx:  { label:"🔵 Approx. corridor arches",    color:JAECK, radius:6 },
  lead:    { label:"🔵 Shoemaker / Eagle-Twp lead", color:JAECK, radius:9 }
};

/* ---- base layers ---- */
// Esri World Topo as the default basemap — fast & reliable, shows relief + labels.
// OpenTopoMap (richer contours, but slower/rate-limited) kept as an alternate.
const esriTopo = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19, attribution: 'Tiles &copy; Esri — Esri, HERE, Garmin, USGS, NGA & the GIS community'
});
const openTopo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  maxZoom: 17, attribution: 'Map data: &copy; OpenStreetMap contributors, SRTM | Style: &copy; OpenTopoMap (CC-BY-SA)'
});
const usgsTopo = L.tileLayer('https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 16, attribution: 'Tiles courtesy of the USGS National Map'
});
const street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19, attribution: '&copy; OpenStreetMap contributors'
});
const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19, attribution: 'Imagery &copy; Esri, Maxar, Earthstar Geographics'
});

const map = L.map('map', { layers: [esriTopo] });

/* dedicated pane so boundary polygons sit BELOW the markers */
map.createPane('publiclands');
map.getPane('publiclands').style.zIndex = 350;

/* ---- one layer group per category ---- */
const groups = {};
for (const key in cats) groups[key] = L.layerGroup().addTo(map);

const allLatLng = [];
const searchIndex = [];  // {name, lat, lng, marker, group, color, kind, sub, hay} — powers the search box
points.forEach(p => {
  const c = cats[p.cat];
  const radius = p.strong ? 11 : c.radius;
  const marker = L.circleMarker([p.lat, p.lng], {
    radius: radius,
    color: p.strong ? "#ffffff" : "#333333",
    weight: p.strong ? 3 : 1,
    fillColor: c.color,
    fillOpacity: 0.92,
    dashArray: p.approx ? "3 3" : null
  });
  const coordTxt = p.lat.toFixed(4) + ", " + p.lng.toFixed(4);
  const flag = p.approx ? '<div class="flag">approx — county/landmark only</div>' : '';
  marker.bindPopup(
    '<div class="popup"><b>' + p.name + '</b>'
    + '<div class="meta">County: ' + p.county + '<br>Bedrock: ' + p.bedrock
    + '<br>Coords: ' + coordTxt + '</div>'
    + '<div class="role">' + p.role + '</div>' + flag + '</div>'
  );
  marker.bindTooltip(p.name, { direction:"top", offset:[0,-radius] });
  marker.addTo(groups[p.cat]);
  searchIndex.push({ name:p.name, lat:p.lat, lng:p.lng, marker:marker, group:groups[p.cat], color:c.color, kind:'circle', sub:p.county + ' County', hay:(p.name + ' ' + p.county + ' ' + p.role).toLowerCase() });
  allLatLng.push([p.lat, p.lng]);
});

/* ---- REFINEMENT 1: Eagle Township focus rectangle (approx, NW Vinton) ---- */
const eagleTwp = L.rectangle([[39.330,-82.645],[39.435,-82.515]], {
  color:"#e67e22", weight:2, dashArray:"6 5", fillColor:"#e67e22", fillOpacity:0.06
}).bindTooltip("Eagle Township (approx) — Shoemaker search frame", {sticky:true});
eagleTwp.addTo(groups.lead);

/* ---- optional: "down toward the Ohio River" reach (Episode 7), off by default ---- */
const reach = L.polyline(
  [[39.5403,-82.4071],[39.5144,-81.1808]],
  { color:"#e74c3c", weight:2.5, dashArray:"8 7", opacity:0.7 }
);

/* ============================================================ *
 * OHIO CAVE SURVEY caves (SQUARES) — a SEPARATE dataset from the
 * round video-series anchors above. Synthesized from OCS meeting
 * minutes + "Underground Ohio" newsletters, then geolocated via web
 * research (USGS GNIS, park pages, Wikipedia, the OCS "Top-Ten
 * Longest" list, and Warren Luther's Pholeos articles).
 * Solid square  = exact public feature / good landmark.
 * Faded+dashed  = county-level approx, or exact site not yet pinned
 *                 (most wild caves are private-land; anchored to the
 *                 nearest public landmark / county seat).
 * ============================================================ */
const ocsRegions = {
  ne:      { label:"NE — Sharon Conglomerate",      color:"#8d6e63" },
  erie:    { label:"Lake Erie Islands",             color:"#0097a7" },
  central: { label:"Central Ohio",                  color:"#3f51b5" },
  sw:      { label:"SW karst (Serpent Mound belt)", color:"#ff7043" },
  wc:      { label:"W-central show caves",          color:"#c2185b" },
  nw:      { label:"NW Ohio",                        color:"#00695c" },
  se:      { label:"SE sandstone (OCS)",            color:"#f9a825" }
};
const ocsCaves = [
  // —— NE Ohio: Sharon Conglomerate (Geauga / Lake / Summit / Portage) ——
  {n:"Thompson Ledges caves", reg:"ne", county:"Geauga", lat:41.6870, lng:-81.0443, prec:"exact",
   d:"Public Sharon Conglomerate ledges. A cluster of fracture / slump-block caves: Thompson Ledges Cave (a.k.a. Dead Man's, 44 ft), Right Angle Cave, Frank's Crawl, Dead Dog Cave, Sidley's Talus II."},
  {n:"Ansel's Cave / Little Bear Cave — The West Woods", reg:"ne", county:"Geauga", lat:41.4593, lng:-81.2988, prec:"landmark",
   d:"&#9888; <b>Location approximate.</b> Geauga Park District, 956-ac <b>West Woods</b> (Russell/Newbury Twp; nature center 9465 Kinsman Rd, 41.4630,-81.3042). <b>Ansel's Cave is not a true cave</b> &mdash; it's a dramatic Sharon-Conglomerate rock-shelter / narrow gorge with a ~20-ft tiered waterfall along a branch of Silver Creek (locally 'Pebble Brook'), which early settlers called a cave; legend ties it to Civil War soldiers, the Underground Railroad, Prohibition bootleggers, and a resident named Ansel. Cave access is restricted (naturalist-led only). <b>Little Bear Cave</b> &mdash; a single ~20-ft Sharon-Conglomerate fissure nearby &mdash; is open to the public. <b>Ansel's Real Cave</b> (the actual OCS-database cave) is a <i>separate</i> site in another part of the park &mdash; mapped separately. <b>Relocated 2026-07-02</b> from a wrong point ~1 mi S (41.443,-81.298, below the park) to the gorge on the Ansel's Cave Trail (confirmed via 3DEP LiDAR + Nominatim + the park's own brochure coordinate). Src: OCS 'Under Ohio' v3i2 (2025, F. Vlchek); Geauga Park District."},
  {n:"Ansel's Real Cave — The West Woods", reg:"ne", county:"Geauga", lat:41.4608, lng:-81.2952, prec:"undisclosed",
   d:"&#9888; <b>Location approximate (exact site withheld).</b> The actual cave in the OCS database &mdash; distinct from the 'Ansel's Cave' rock-shelter, and in <i>another part of</i> The West Woods per OCS's 2025 relocation. A 28-ft Sharon-Conglomerate stream cave: a low entrance with constant water outflow plus two side-by-side dry entrances into a perpendicular passage; a <b>former bat hibernaculum</b> (pre-White-Nose-Syndrome &mdash; none seen 2025). OCS took a GPS reading (F. Vlchek) that matched their database, but the coordinates are unpublished and the (former-hibernaculum) entrance is protected &mdash; shown here only at park level, offset from the public Ansel's Cave. Src: OCS 'Under Ohio' v3i2, 2025."},
  {n:"Little Mountain", reg:"ne", county:"Lake / Geauga", lat:41.637821, lng:-81.271993, prec:"exact",
   d:"Verified &amp; Confirmed"},
  {n:"Dart's Cave / Merkle's Caves (Sand Hill)", reg:"ne", county:"Geauga", lat:41.5375, lng:-81.2775, prec:"landmark",
   d:"&#9888; <b>Location approximate.</b> On <b>Sand Hill</b> — a Sharon-Conglomerate upland whose southern base is at <b>Fowler's Mill</b> (GNIS hamlet 41.5276,-81.2559, on the E. Branch Chagrin R.), Munson Twp. Three parallel box-canyon gorges run S&rarr;N: Fern Gorge &middot; Twin Falls &middot; <b>Dart's-Merkle's</b> (northernmost). <b>Dart's Cave</b> = the old 'Skylight Cave': a walk-in stream entrance into a large dark room with sheer walls, where a ceiling skylight drops the stream ~30 ft; Dart's sits <b>downstream of Merkle's</b> (a long box canyon holding NE-Ohio's largest natural tunnel, ~30-ft span). <b>Refined 2026-07-02</b> from a wrong flat-upland point (41.540,-81.262) to the 3DEP-identified box-canyon complex NW of Fowler's Mill (dissected gorges ~41.533-41.540, -81.274 to -81.282; ~110-140 ft relief). Exact gorge/entrance pending OCS's 2025 GPS (unpublished) or OSIP LiDAR. Src: Pholeos v9(1) (geology), v3, Speleo Digest 1974 (Luther/Cleveland Grotto survey), OCS 'Under Ohio' v3i2 (2025); older refs Lynch 1974 (Cleve-O-Grotto News) &amp; Porter 1965 (NEOG Log). <b>RECONCILED 2026-07-02:</b> this <b>is</b> the group Pholeos v3 (M&amp;O 1982) mapped as the 'Chesterland Caves area' &mdash; their main 'Chesterland Cave' = 'Skylight Cave' = <b>Dart's Cave</b>, with Leaning Cave beside it (confirmed independently by Pholeos v9 &amp; OCS 2025, and by the shared Robber's = Bat/Parker Cave). The former Sunnybrook 'Chesterland' markers were consolidated onto this Sand Hill complex; exact per-cave gorges/entrances pending OCS's unpublished 2025 GPS."},
  {n:"Card's Cave", reg:"ne", county:"Geauga", lat:41.5455, lng:-81.2900, prec:"landmark",
   d:"&#9888; <b>Location approximate.</b> A historic ~150-ft cave, now largely destroyed (blocks pulled apart for landscaping). On a small Sharon Conglomerate outlier between Sand Hill and Gildersleeve Mountain, Munson Twp (Pholeos v9; Warren Luther). Anchored to that outlier — no finer location in our sources."},
  {n:"Roaring Springs Cave", reg:"ne", county:"Geauga", lat:41.4480, lng:-81.3020, prec:"undisclosed",
   d:"&#9888; <b>Location approximate.</b> A spring rock-shelter (~12&times;12&times;8 ft) the OCS relocated in 2025, matching Warren Luther's 1950s description; a stream &amp; a probable (unseen) waterfall issue from a low passage in the NW corner, and an inlet pipe feeds a neighbor's well. On private land 'just down the street' from The West Woods (Geauga Park District, home of Ansel's Cave). Exact site not yet pinned (OCS). Src: OCS 'Under Ohio' v3i2, 2025."},
  {n:"Bierce Cave", reg:"ne", county:"Summit", lat:41.1243, lng:-81.4973, prec:"landmark",
   d:"&#9888; <b>Location approximate.</b> A Sharon-Conglomerate joint/crevice cave (two small rooms, ~10 ft high) on the north bank of the Cuyahoga in <b>Gorge Metropolitan Park</b>, Cuyahoga Falls, Summit Co. — near Mary Campbell's Cave. Named by the Ohio Cave Survey for <b>Gen. Lucius V. Bierce</b> (Akron historian; uncle of writer Ambrose Bierce), who discovered it in 1826 &amp; described it in his 1854 'Historical Reminiscences of Summit County,' then couldn't relocate it ('some future explorer will bring it again to light'). Bricked up in 1968 after a teen got stuck; re-gated 2022 to protect hibernating endangered tricolored (&amp; big brown) bats. Location well-confirmed (no county conflict); exact entrance protected/not publicized by Summit Metro Parks. Src: L.V. Bierce 1854 (via Pholeos v9 &amp; Speleo Digest 1988); OCS 'Under Ohio' v1i1 (2023); Summit Metro Parks."},
  {n:"Devil's Den Fracture System", reg:"ne", county:"Portage", lat:41.33117, lng:-81.04204, prec:"landmark",
   d:"&#9888; <b>Location approximate.</b> #5 longest in Ohio (1,155 ft). A Sharon-Conglomerate crevice/fracture system at <b>Nelson-Kennedy Ledges State Park</b> — the park's famous ledge-crevice network (Devil's Icebox, Fat Man's Peril, etc.). Anchored to Nelson Ledge (GNIS); confirmed as 'the Devil's Den at Nelson Ledges' in Speleo Digest 1988. (NB: a different 'Devil's Den' exists in Adams/Ross Co.)"},
  {n:"Hoaches Cave — 'Lost Hole of Hoaches'", reg:"ne", county:"Geauga", lat:41.6000, lng:-81.1900, prec:"county",
   d:"&#9888; <b>Location approximate.</b> An obscure, now-closed Sharon-Conglomerate joint-controlled cave (entrance drop, a low crawl 'Ehud's Revenge', a 'trunk' passage) in NE Ohio. <b>County corrected 2026-07-02: Summit&rarr;Geauga.</b> Our sources are all Cleveland-Grotto material and conflict on locale, but the reliable ones agree on the Geauga/Painesville area: NSS News Jan 1987 places it <b>'near Painesville'</b> (Doug Welker's post-earthquake resurvey); NSS News Aug 1988 says <b>'Geauga County'</b> (a rabbit-chase found a new connection into it); and the Speleo Digest 1986 trip report notes the cave lies <b>&lt;10 mi from the 31 Jan 1986 Leroy earthquake epicenter</b> (41.650,-81.162) and was reached from 'near Chardon.' The <b>American Caving Accidents</b> account ('near Twinsburg,' Summit) — the basis for our old point — is the <b>outlier</b> (its editor flagged the toilet-trap story '(Is this real??? Ed.)') and Twinsburg is ~27 mi from the epicenter, breaking the &lt;10-mi note. Re-anchored to <b>N Geauga near Chardon</b>, inside the 10-mi epicenter circle. The cave-name origin is <b>undocumented</b> in our sources — a 'Hoach' landowner was an assumption and is <b>not</b> confirmed in Geauga/Lake land or genealogy records searched (2026-07-02); exact entrance unknown/possibly lost. Src: Nadich 1989 (Cleve-O-Grotto News 35(7)); NSS News 1/1987 &amp; 8/1988; Speleo Digest 1986; ACA (Dec 1990)."},
  // —— Lake Erie Islands: dolomite (Ottawa — South Bass / Put-in-Bay) ——
  {n:"Perry's Cave", reg:"erie", county:"Ottawa", lat:41.64730, lng:-82.82723, prec:"exact",
   d:"Commercial cave on South Bass Island / Put-in-Bay (979 Catawba Ave). Celestite; its freshwater pool is argued to have supplied Perry's fleet in the 1813 Battle of Lake Erie. [Coords upgraded to exact 2026-07-01: OSM cave node + Census geocode of 979 Catawba Ave agree.]"},
  {n:"Paradise Cave", reg:"erie", county:"Ottawa", lat:41.6545, lng:-82.8175, prec:"landmark",
   d:"&#9888; <b>Location approximate.</b> #9 longest in Ohio (640 ft). A clear-water dolomite cave on South Bass Island."},
  {n:"Kindt's Cave (+ island caves)", reg:"erie", county:"Ottawa", lat:41.6450, lng:-82.8335, prec:"undisclosed",
   d:"&#9888; <b>Location approximate.</b> Entered down a roadside 'wishing well'; owner Bob Kindt — the OCS landowner-appreciation 'Kint' cave. Nearby island caves: Larcomb (sealed), Duffs (Dodge Woods Preserve) & the Cedar Forest caves."},
  {n:"Crystal Cave", reg:"erie", county:"Ottawa", lat:41.64670, lng:-82.82794, prec:"exact",
   d:"The world's largest geode — a vug lined with blue celestite (strontium sulfate) crystals up to ~3 ft long, beneath Heineman's Winery (978 Catawba Ave) on South Bass Island / Put-in-Bay. Commercial show cave. (Source: DUG 'Ohio Commercial Caves' list.)"},
  // —— Central Ohio (Franklin / Muskingum) ——
  {n:"Griggs Dam Caves 1 & 2", reg:"central", county:"Franklin", lat:40.0162, lng:-83.0936, prec:"landmark",

function ocsIcon(reg, faded){
  const c = ocsRegions[reg].color;
  return L.divIcon({ className:'ocs-icon',
    html:'<span class="ocs-sq" style="background:'+c+';opacity:'+(faded?0.5:0.95)+';border-style:'+(faded?'dashed':'solid')+'"></span>',
    iconSize:[13,13], iconAnchor:[6,6] });
}
const precLabel = { exact:"exact public feature", landmark:"landmark anchor (cave is nearby)", county:"county-level approximation", undisclosed:"exact location not yet pinned (anchored to a landmark)", frame:"geological frame feature" };
ocsCaves.forEach(c => {
  const faded = (c.prec==='county' || c.prec==='undisclosed');
  const m = L.marker([c.lat,c.lng], { icon: ocsIcon(c.reg, faded) });
  m.bindPopup('<div class="popup"><b>'+c.n+'</b>'
    + '<div class="meta">Region: '+ocsRegions[c.reg].label+' &middot; '+c.county
    + '<br>Coords: '+c.lat.toFixed(4)+', '+c.lng.toFixed(4)
    + '<br>Precision: '+precLabel[c.prec]+'</div>'
    + '<div class="role">'+c.d+'</div></div>');
  m.bindTooltip(c.n, {direction:"top", offset:[0,-6]});
  m.addTo(ocsGroups[c.reg]);
  searchIndex.push({ name:c.n, lat:c.lat, lng:c.lng, marker:m, group:ocsGroups[c.reg], color:ocsRegions[c.reg].color, kind:'square', sub:ocsRegions[c.reg].label, hay:(c.n + ' ' + c.county + ' ' + ocsRegions[c.reg].label + ' ' + c.d).toLowerCase() });
  allLatLng.push([c.lat,c.lng]);
});

  // Karst GEOLOGY regions — ODNR layer 2 "Karst Geology of Ohio", drawn in ODNR's NATIVE symbology
  //  (blue = Silurian–Devonian carbonate = the main cave-bearing rock; yellow = interbedded Ordovician
  //   limestone & shale; paler shade = <20 ft glacial-drift cover / more karst-prone, darker = >20 ft). On by default.
  karstRegions = L.esri.dynamicMapLayer({
    url: KARST_URL, layers:[2], pane:'karstpane', opacity:0.55
  }).addTo(map);
  // Known karst FEATURES — ODNR layer 4 "Karst Points" (all 46,789), ODNR native colors = confidence tier:
  //  reddish-orange #d3492b = field-verified · orange #e69800 = suspect/field-visited · yellow #e6e600 = suspect/not-visited.
  karstPoints = L.esri.dynamicMapLayer({ url: KARST_URL, layers:[4], pane:'karstpane', opacity:0.9 }); // off by default — toggle in the layer menu
  const kv = function(x){ return (x===null||x===undefined||x===''||(''+x).toLowerCase()==='null') ? null : (''+x).replace(/\s+/g,' ').trim(); };
  const titleCase = function(s){ return s.replace(/\b\w/g, function(c){ return c.toUpperCase(); }); };
  const kscore = function(pr){ let s=0; ['COUNTY','TOWNSHIP','BG_UNIT','COMMENTS','DGS_KARSTID'].forEach(function(k){ if(kv(pr[k])) s++; }); if(/verified/i.test(pr.POINT_TYPE||'')) s+=2; return s; };
  karstPoints.bindPopup(function(err, fc){
    if (err || !fc || !fc.features || !fc.features.length) return false;
    const n = fc.features.length;
    let p = fc.features[0].properties, bs = kscore(p);
    for (let i=1;i<n;i++){ const s = kscore(fc.features[i].properties); if (s>bs){ bs=s; p=fc.features[i].properties; } }
    const type = kv(p.POINT_TYPE) || 'Karst feature';
    const county = kv(p.COUNTY), twp = kv(p.TOWNSHIP), bg = kv(p.BG_UNIT), id = kv(p.DGS_KARSTID), com = kv(p.COMMENTS);
    const meta = [];
    if (county) meta.push(county + ' County' + (twp ? (' &middot; ' + titleCase(twp) + ' Twp') : ''));
    if (bg) meta.push('Bedrock unit: ' + bg);
    if (id) meta.push('ODNR karst ID: ' + id);
    if (n > 1) meta.push('<i>' + n + ' known karst features at this spot</i>');
    return '<div class="popup"><b>' + type + '</b>'
      + (meta.length ? ('<div class="meta">' + meta.join('<br>') + '</div>') : '')
      + (com ? ('<div class="role">' + com.slice(0,240) + '</div>') : '')
      + '<div class="flag">ODNR EG-1 known karst site</div></div>';
  });
}

/* ---- generic graceful-degradation GeoJSON loader ---- */
function loadGeo(url, layer, transform, onfail){
  fetch(url).then(r => r.json()).then(geo => {
    const feats = transform ? transform(geo) : (geo.features || []);
    layer.addData({ type:"FeatureCollection", features: feats });
  }).catch(() => { if (onfail) onfail(); });
}

  { n:"Mississippi Palisades SP caves", reg:"IL", county:"Carroll", lat:42.14412, lng:-90.16856, prec:"landmark",

  { n:"Cave of the Spirit", reg:"IL", county:"Kane", lat:41.8177, lng:-88.32328, prec:"landmark",

  { n:"Whipple's Cave", reg:"IL", county:"Lee", lat:41.84934, lng:-89.33632, prec:"landmark",

  { n:"Blackball Mines", reg:"IL", county:"LaSalle", lat:41.3417, lng:-89.04175, prec:"landmark",

  { n:"Apple River Canyon SP", reg:"IL", county:"Jo Daviess", lat:42.44676, lng:-90.05288, prec:"landmark",

  { n:"Horseshoe Mound Preserve", reg:"IL", county:"Jo Daviess", lat:42.40448, lng:-90.39523, prec:"landmark",

  { n:"Galena River Trail (mining adits)", reg:"IL", county:"Jo Daviess", lat:42.41557, lng:-90.43032, prec:"landmark",

  // ==== WISCONSIN Niagara-Escarpment show/park caves (added 2026-07-02: OSM cave_entrance + WI Speleological Society / WGNHS) ====
  { n:"Maribel Caves (New Hope Cave & park cluster)", reg:"WI", county:"Manitowoc", lat:44.28833, lng:-87.77411, prec:"exact",
    d:"In <b>Cherney Maribel Caves County Park</b> (75 ac), Town of Cooperstown, Manitowoc Co — a cluster of Silurian-dolomite (Niagara Escarpment) solution caves along the West Twin River. Marquee = <b>Maribel New Hope Cave</b> (this pin): once choked with glacial till, hand-excavated by the Wisconsin Speleological Society to <b>nearly 1,000 ft counting side passages</b> (per the 2026 Soule/DeBaker interview — 15th tour season); stand-up walk-through with an underground stream, a 9-ft rock pillar &amp; stalactites; guided tours the 3rd Sunday, May–Oct, 10–3. The park also holds the Tartarus Cave System, Cave of Treasures, and the Cooper's, Spring, Pancake, Staircase &amp; Sinkhole caves, plus the ruined (reputedly haunted) early-1900s Maribel Caves Hotel. Public county park. Src: WI Speleological Society; WGNHS; OSM cave_entrance." },
  { n:"Ledge View Caves (Carolyn's Caverns)", reg:"WI", county:"Calumet", lat:44.00687, lng:-88.15289, prec:"exact",
    d:"At the <b>Ledge View Nature Center</b> (W2348 Short Rd, Chilton), Calumet Co — Silurian-dolomite solution caves in the Niagara Escarpment. Marquee = <b>Carolyn's Caverns</b> (this pin), the main guided-tour cave (ladders &amp; tight vertical passages); the site also has <b>Montgomery Cave</b> and the <b>Cavern of the Maidens</b>. County-run nature center with public tours. Src: Ledge View Nature Center; OSM cave_entrance." },

  // ==== WISCONSIN — NSS-corpus catalog caves geo-located via BLM PLSS + OSM (2026-07-02; see Desktop\caves\WI_Cave_Catalog.md) ====
  { n:"Cave of the Mounds", reg:"WI", county:"Dane", lat:43.01674, lng:-89.81486, prec:"exact",
    d:"National Natural Landmark &amp; WI's most famous show cave; ~2,500 ft in Galena dolomite, blast-discovered 4 Aug 1939; NNL 1987. Public show cave near Blue Mounds. Src: OSM cave node + NSS WI cave catalog." },
  { n:"Eagle Cave", reg:"WI", county:"Richland", lat:43.24368, lng:-90.54113, prec:"exact",
    d:"Largest onyx/show cave in WI (~960 ft on tour) in Prairie du Chien dolomite near Blue River/Muscoda; studied by Bretz; site of the WSS 'Hodag Hunts'. Private natural park + campground. Src: OSM cave node + NSS WI cave catalog." },
  { n:"Crystal Cave", reg:"WI", county:"Pierce", lat:44.83252, lng:-92.25195, prec:"exact",
    d:"WI's LONGEST cave; 3-level phreatic show cave in Prairie du Chien dolomite W of Spring Valley. Historic survey 2,076 ft; ongoing digs have pushed it well past Horseshoe Bay's 3,103 ft (modern accounts cite 4,600+ ft). Found 1881; commercial since 1942; 4 bat species hibernate. Src: OSM cave node + NSS WI cave catalog; Soule interview 2026." },
  { n:"Kickapoo Indian Caverns + Wauzeka Cave", reg:"WI", county:"Crawford", lat:43.09924, lng:-90.95441, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> Two caves 179 ft apart, combined ~1,400 ft \u2014 'probably the most extensive cavern system in WI'; Prairie du Chien dolomite; found by lead miners in the 1880s, commercial 1947. Near Wauzeka. PLSS 7N R5W S10 SE/NW (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Lost River Cave (Fort Blue Mounds)", reg:"WI", county:"Iowa", lat:43.01731, lng:-89.84206, prec:"exact",
    d:"Ex-commercial multilevel show cave in Galena dolomite at Blue Mounds, with a man-made tunnel to an 1800s army fort; WSS/Iowa Grotto restoration 2006. AKA Pokerville Cave. Src: OSM cave node + NSS WI cave catalog." },
  { n:"Badger Mine", reg:"WI", county:"Lafayette", lat:42.57022, lng:-90.23573, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> Commercial gash-vein lead-zinc mine in the Galena formation at Shullsburg, 'the heart of the WI/Tri-State mining region'; worked from 1827, opened as a mining museum 1965 (~1/2 mi on tour). Src: OSM cave node + NSS WI cave catalog." },
  { n:"Bogus Bluff Cave", reg:"WI", county:"Richland", lat:43.21407, lng:-90.34799, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> 600+ ft of crawl in Prairie du Chien dolomite atop Bogus Bluff near Gotham/Sextonville; soda straws, cave coral; bat hibernaculum; WI's richest cave folklore (counterfeiters, a 'lost cave' of Indian artifacts). AKA Counterfeiter's Cave. PLSS 9N R1E S35 NW/SW (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Pop's Cave", reg:"WI", county:"Richland", lat:43.38195, lng:-90.59611, prec:"exact",
    d:"~645 ft walking cave in Prairie du Chien dolomite; stalactites below breakdown, rimstone pools, cave ice, helictites; bat hibernaculum. AKA Big Bear Cave. Sabin Twp. Src: OSM cave node + NSS WI cave catalog." },
  { n:"John Gray Cave", reg:"WI", county:"Richland", lat:43.40366, lng:-90.32276, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> Talus-cone entrance into a low room; 3 muddy phreatic passages, soda straws, a natural bridge, small bat colony; ~710 ft (surveyed by E.G. Lange 1909). AKA Squirrel Cave. Near Richland Center. PLSS 11N R1E S25 SE/NW (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Taylor Pit Cave", reg:"WI", county:"Richland", lat:43.32967, lng:-90.51081, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> Sink down a 70-deg mud slope (rope/ladder); one of WI's most varied formation suites (bacon rind, draperies, popcorn, helictites) + a 3-D phreatic maze; ~216 ft. Boaz quad. PLSS 10N R1W S20 SW/SE/NE (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Indian Cave (petroglyphs)", reg:"WI", county:"Richland", lat:43.53646, lng:-90.57479, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> 23-ft Cambrian-sandstone rockshelter with carved Indian petroglyphs; an on-and-off ~8,000-yr archaeological shelter. La Farge quad. PLSS 12N R2W S11 W/NE/NE (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Bridgeport Cave", reg:"WI", county:"Crawford", lat:43.02927, lng:-91.04376, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> Biggest single room in WI: a collapse cave risen from Prairie du Chien dolomite into St. Peter sandstone; ceiling-sinkhole ~30-ft rappel into a 108x40-50 ft room; total 202 ft. Only known moonmilk (hydromagnesite) in Wisconsin. PLSS 6N R6W S2 SE/NE/NE (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Boscobel Bear Cave", reg:"WI", county:"Grant", lat:43.21971, lng:-90.74507, prec:"exact",
    d:"20-ft sinkhole to a main room ~60x30 ft, up to 35 ft high, biggest breakdown to 20 ft; Prairie du Chien dolomite; total ~1,300 ft; ice stalagmites; bat hibernaculum. AKA Cave of the Little Bears. (Maps say Crawford; Boscobel town is in Grant.) Src: OSM cave node + NSS WI cave catalog." },
  { n:"Star Valley Cave", reg:"WI", county:"Crawford", lat:43.39196, lng:-90.90134, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> ~800 ft Prairie du Chien dolomite maze/tour cave; the entrance room shows the initial collapse stage under St. Peter sandstone. Gays Mills quad. PLSS 11N R4W S31 SW/NE/NW (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Bear Creek Cave", reg:"WI", county:"Sauk", lat:43.37365, lng:-90.11904, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> One of WI's best-decorated caves (~950-1,500 ft), opened by quarrying 1954, gated: Big Room, Cleo's Dome, Leprechaun's Ballroom, King's/Queen's Chambers. Bought by The Nature Conservancy (via WSS), deeded to UW; bat hibernaculum. AKA Brice/Quarry Cave. PLSS 10N R3E S3 SE/SW/NE (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Cave of the Dark Waters", reg:"WI", county:"Sauk", lat:43.62562, lng:-89.77156, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b>  ~150 ft of enlarged Cambrian-sandstone joints with 3 entrances, below the dam at Wisconsin Dells near Grotto Rock on the W shore of the Wisconsin River; boat access. Anchored to Wisconsin Dells, Wisconsin. Src: NSS WI cave catalog." },
  { n:"Rocky Arbor Cave", reg:"WI", county:"Sauk", lat:43.64186, lng:-89.80478, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> 20-ft Cambrian-sandstone joint cave in Rocky Arbor State Park (straddles into Juneau Co). Wisconsin Dells quad. PLSS 14N R6E S32 SE/SW/SE (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Sandberg Crevice Cave #2", reg:"WI", county:"Sauk", lat:43.23049, lng:-89.96377, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> 2nd-longest sandstone cave in WI (293 ft, ~3 ft wide); entered via a dolomite quarry dropping into flat-floored Cambrian sandstone. PLSS 9N R4E S25 NW/SW/NE (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Elephant Cave (Devil's Lake)", reg:"WI", county:"Sauk", lat:43.42468, lng:-89.7252, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> 30-ft joint cave in Baraboo QUARTZITE conglomerate (rare) on East Bluff, Devil's Lake State Park. AKA Devil's Cave. PLSS 11N R6E S13 SE/SW/SE (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Snake Eye Cave (Devil's Lake)", reg:"WI", county:"Sauk", lat:43.41196, lng:-89.7131, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> Enlarged fracture in Baraboo quartzite (~30 ft horizontal + ~40 ft of chimneying), South Shore Drive, Devil's Lake State Park. PLSS 11N R7E S19 NW/SE/SW (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Rogers Cave", reg:"WI", county:"Iowa", lat:43.08295, lng:-90.16111, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> 600-720 ft of wet muddy Prairie du Chien dolomite passage; the ONLY known aragonite occurrence in Wisconsin; bat hibernaculum. Spring Green quad. PLSS 7N R3E S17 NW/NW/SE (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Cobb Cave", reg:"WI", county:"Iowa", lat:43.10446, lng:-90.29888, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> 2nd-largest sandstone cave in WI (~260 ft): a single 35x50 ft room, floor a collapsed St. Peter sandstone block over a Prairie du Chien void (40 ft relief); black flowstone. Owner near Avoca. PLSS 7N R2E S7 NW/NW/NE (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Jones Cave", reg:"WI", county:"Iowa", lat:43.07033, lng:-89.90083, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> Classic collapse cave: sinkhole 25x15 ft into a ~45-ft circular room with an active sump; St. Peter sandstone. Blue Mounds quad. PLSS 7N R5E S21 NW/SE/NE (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Bud Cave", reg:"WI", county:"Iowa", lat:43.07033, lng:-89.89608, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> Collapse room ~40 ft diameter with unusual black silicate-cement knob formations; St. Peter sandstone; ~2,000 ft SE of Jones Cave. PLSS 7N R5E S22 NW/SW/NW (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Highland Cave", reg:"WI", county:"Iowa", lat:43.10613, lng:-90.31613, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> Large opening dropping ~20 ft to an open-roofed room at a joint intersection; St. Peter sandstone. AKA Principal Cave. Muscoda quad. PLSS 7N R1E S1 SE/SW/SE (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Ridgeway Cave", reg:"WI", county:"Iowa", lat:43.0194, lng:-89.98933, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> ~60-ft collapse room in St. Peter sandstone entered between tree roots in the 'Giant Sink,' ~1.5 mi N of Ridgeway. AKA Cave of the Giant Sink. PLSS 6N R4E S2 NW/SE/SW (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Apple Hill Caves", reg:"WI", county:"Iowa", lat:43.10758, lng:-90.11721, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> Cave group in an active quarry (#2/#3 ~900 ft largely destroyed by quarrying); Prairie du Chien dolomite; cited as one of WI's three most beautiful caves. Spring Green quad. PLSS 7N R3E S3 NW/SE/SE (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Cox Hollow Cave", reg:"WI", county:"Iowa", lat:43.01001, lng:-90.1066, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> Rockshelter + short crevice in St. Peter sandstone, in Governor Dodge State Park. AKA Sand Cliff Cave. PLSS 6N R3E S11 NW/NE/SW (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Twin Valley Cave", reg:"WI", county:"Iowa", lat:43.02741, lng:-90.09216, prec:"exact",

  { n:"Coon Rock Cave", reg:"WI", county:"Iowa", lat:43.14782, lng:-89.99564, prec:"exact",

  { n:"Lange's Cave", reg:"WI", county:"Dane", lat:43.02644, lng:-89.83597, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> 250 ft between the East &amp; West Blue Mounds (1,400 ft elev.); stalactites to 15 in; upper Galena dolomite; surveyed by E.G. Lange 1909; entrance closed early 1930s. AKA Blue Mounds Cave. PLSS 6N R6E S6 SW/NW (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Blue Mounds State Park Cave", reg:"WI", county:"Dane", lat:43.02168, lng:-89.84694, prec:"landmark",
    d:"&#9888; <b>Location approximate.</b> Gated crevice/fissure cave ~150 ft with a stream slot to 12 ft; peccary &amp; wild-dog remains excavated; Galena-Black River dolomite; state-owned. AKA Pleasure Valley/Quisling Cave. PLSS 6N R5E S1 SW/NW/SE (4th PM), geo-located via BLM PLSS. Src: WI cave catalog (NSS SD_1961/1970 + Guidebooks)." },
  { n:"Enerson's Cave", reg:"WI", county:"Dane", lat:43.13904, lng:-89.74792, prec:"landmark",

  { n:"Black Hawk's Cave", reg:"WI", county:"Dane", lat:43.08722, lng:-89.44603, prec:"exact",
    d:"Rockshelter/cave landmark near Madison/Wisconsin River; OSM-mapped. Dane Co. Src: OSM cave node + NSS WI cave catalog." },
  { n:"Richardson Cave", reg:"WI", county:"Dane", lat:43.02773, lng:-89.56756, prec:"exact",
    d:"Dane Co. cave near Verona (OSM attraction node); folklore/history cave in the catalog. Src: OSM cave node + NSS WI cave catalog." },

expansionCaves.forEach(c => {
  const faded = (c.prec==='county' || c.prec==='undisclosed');
  const m = L.marker([c.lat,c.lng], { icon: expIcon(expansionRegions[c.reg].color, faded) });
  m.bindPopup('<div class="popup"><b>'+c.n+'</b>'
    + '<div class="meta">'+expansionRegions[c.reg].label+' &middot; '+(c.county||'')
    + '<br>Coords: '+c.lat.toFixed(4)+', '+c.lng.toFixed(4)
    + (c.prec ? '<br>Precision: '+(precLabel[c.prec]||c.prec) : '')+'</div>'
    + '<div class="role">'+(c.d||'')+'</div></div>');
  m.bindTooltip(c.n, {direction:"top", offset:[0,-6]});
  m.addTo(expansionGroups[c.reg]);
  searchIndex.push({ name:c.n, lat:c.lat, lng:c.lng, marker:m, group:expansionGroups[c.reg],
    color:expansionRegions[c.reg].color, kind:'square', sub:expansionRegions[c.reg].label,
    hay:(c.n+' '+(c.county||'')+' '+expansionRegions[c.reg].label+' '+(c.d||'')).toLowerCase() });

/* ---- controls ---- */
const baseLayers = {
  "Topographic (Esri)": esriTopo,
  "Topographic (OpenTopoMap)": openTopo,
  "USGS Topo": usgsTopo,
  "Street": street,
  "Satellite": sat
};
const overlays = {};
for (const key in cats) overlays[cats[key].label] = groups[key];
overlays["↘ 'Toward the Ohio River' (Ep. 7)"] = reach;
overlays["🟩 Wayne National Forest"] = wayneLayer;
overlays["🟩 Ohio State Forests"] = stateForestLayer;
overlays["▦ 13-county search corridor"] = corridorLayer;
for (const r in ocsRegions) overlays["■ OCS · " + ocsRegions[r].label] = ocsGroups[r];
if (karstRegions) overlays["🟦🟨 Karst geology — ODNR EG-1 (blue=carbonate, yellow=Ordovician)"] = karstRegions;
if (karstPoints)  overlays["🔴🟠🟡 Karst features — ODNR EG-1 (46,789, by confidence)"] = karstPoints;
overlays["① Top-10 longest caves (ranked)"] = top10Layer;
overlays["▨ OCS cave regions (generalized)"] = caveRegionLayer;
for (const r in expansionRegions) overlays["■ " + expansionRegions[r].label] = expansionGroups[r];
L.control.layers(baseLayers, overlays, { collapsed:true, position:'topleft' }).addTo(map);

/* ---- keyword search over all named caves & sites (names + their notes) ---- */
const search = L.control({ position:'topleft' });
search.onAdd = function(){
  const d = L.DomUtil.create('div','searchbox');
  d.innerHTML = '<input type="text" id="caveSearch" placeholder="Search caves &amp; sites…" autocomplete="off">'
    + '<div class="search-results" id="searchResults"></div>';
  L.DomEvent.disableClickPropagation(d);
  L.DomEvent.disableScrollPropagation(d);
  return d;
};
search.addTo(map);
(function(){
  const inp = document.getElementById('caveSearch');
  const res = document.getElementById('searchResults');
  let current = [];
  function go(h){
    if (h.group && !map.hasLayer(h.group)) map.addLayer(h.group);  // make sure its layer is on
    map.flyTo([h.lat, h.lng], 13, { duration:1.0 });
    setTimeout(function(){ h.marker.openPopup(); }, 1050);
    res.innerHTML = ''; inp.value = h.name;
  }
  function run(){
    const q = inp.value.trim().toLowerCase();
    res.innerHTML = ''; current = [];
    if (q.length < 2) return;
    current = searchIndex
      .filter(function(e){ return e.hay.indexOf(q) >= 0; })
      .sort(function(a,b){
        const ai = a.name.toLowerCase().indexOf(q), bi = b.name.toLowerCase().indexOf(q);
        return (ai < 0 ? 9999 : ai) - (bi < 0 ? 9999 : bi);
      })
      .slice(0, 12);
    if (!current.length){ res.innerHTML = '<div class="none">No matches</div>'; return; }
    current.forEach(function(h){
      const row = document.createElement('div');
      row.className = 'hit';
      const rad = (h.kind === 'circle') ? '50%' : '2px';
      row.innerHTML = '<span class="ssw" style="background:'+h.color+';border-radius:'+rad+'"></span>'
        + '<span>'+h.name+'<small>'+h.sub+'</small></span>';
      row.addEventListener('click', function(){ go(h); });
      res.appendChild(row);
    });
  }
  inp.addEventListener('input', run);
  inp.addEventListener('focus', run);
  inp.addEventListener('keydown', function(e){ if (e.key === 'Enter' && current.length){ e.preventDefault(); go(current[0]); } });
})();


// Default view frames the tri-state expansion (OH · IL · WI). Ohio holds the
// data for now; IL & WI frames are visible and ready to be populated.
const triStateBounds = L.latLngBounds([[37.0,-91.6],[47.1,-80.4]]);
function fitView(){ map.fitBounds(triStateBounds); }
function fitOhio(){ map.fitBounds(L.latLngBounds(allLatLng).pad(0.12)); }
fitView();
