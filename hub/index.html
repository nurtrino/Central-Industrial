<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SPECIAL PROJECTS</title>
<!--
  C64 Pro Mono (c) Style - http://style64.org/c64-truetype
  Embedded via @font-face for local display only; file unmodified & unrenamed
  per the Style64 C64 TrueType license.
-->
<style>
  @font-face{
    font-family:"C64 Pro Mono";
    src:url("fonts/C64_Pro_Mono-STYLE.woff2") format("woff2"),
        url("fonts/C64_Pro_Mono-STYLE.woff") format("woff");
    font-weight:normal; font-style:normal; font-display:swap;
  }
  :root{
    --blue:#352879;     /* C64 screen   (border reg 6)  */
    --light:#6C5EB5;    /* C64 text     (color reg 14) */
    --green:#9AD284;    /* C64 light green - ONLINE   */
    --red:#9A6759;      /* C64 light red  - OFFLINE   */
    --cyan:#70A4B2;     /* C64 cyan       - LOCAL     */
  }
  html,body{height:100%;margin:0;}
  body{
    background:var(--light);
    font-family:"C64 Pro Mono","Courier New",monospace;
    cursor:default; -webkit-font-smoothing:none;
  }
  /* light-blue TV border framing the blue screen */
  .border{box-sizing:border-box;min-height:100vh;padding:4vmin;background:var(--light);}
  .screen{
    position:relative; box-sizing:border-box;
    min-height:calc(100vh - 8vmin);
    background:var(--blue); color:var(--light);
    padding:3.4vmin 4vmin;
    font-size:clamp(13px,2.25vmin,24px); line-height:1.36;
    text-transform:uppercase;
    text-shadow:0 0 6px rgba(154,140,221,.40);
    overflow:hidden;
  }
  /* subtle CRT scanlines + glow */
  .screen::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:repeating-linear-gradient(rgba(0,0,0,.16) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply; opacity:.5;
  }
  pre{margin:0; font:inherit; white-space:pre-wrap; word-break:break-word;}
  a.tool{color:var(--light); text-decoration:none; white-space:nowrap;}
  a.tool:hover,a.tool:focus{background:var(--light); color:var(--blue); outline:none;}
  a.status{text-decoration:none; white-space:nowrap;}
  a.status:hover,a.status:focus{background:var(--light); color:var(--blue)!important; outline:none;}
  .st-online{color:var(--green);}
  .st-offline{color:var(--red);}
  .st-local{color:var(--cyan);}
  .st-wait{color:var(--light);}
  .hint{color:var(--light); opacity:.55;}
  input#accode{background:transparent;border:none;outline:none;color:var(--light);
    font:inherit;text-transform:uppercase;text-shadow:inherit;caret-color:transparent;
    width:0;padding:0;}
  /* blinking C64 block cursor */
  .cursor{
    display:inline-block; width:1ch; height:1.12em; background:var(--light);
    vertical-align:-0.16em; animation:blink 1.02s steps(1,end) infinite;
  }
  @keyframes blink{0%,49%{opacity:1} 50%,100%{opacity:0}}
</style>
</head>
<body>
  <div class="border">
    <div class="screen" id="screen">
<pre id="out">
    **** COMMODORE 64 BASIC V2 ****

 64K RAM SYSTEM  38911 BASIC BYTES FREE

READY.
LOAD"SPECIAL PROJECTS",8,1<span class="cursor" id="bootcur"></span>

<span id="hint" class="hint">[ PRESS ANY KEY ]</span>
</pre>
    </div>
  </div>

  <!-- background music: plays ONCE on the first key/click (no loop); browsers block
       autoplay-with-sound until a user gesture. -->
  <audio id="bgm" preload="auto" src="10-future_sound_of_london-central_industrial-eos.mp3"></audio>

<script>
(function(){
  "use strict";
  var out   = document.getElementById('out');
  var hint  = document.getElementById('hint');
  var booted = false;
  var pollTimer = null;

  function line(text, cls){
    var span = document.createElement('span');
    if(cls) span.className = cls;
    span.textContent = (text == null ? '' : text);
    out.appendChild(span);
    out.appendChild(document.createTextNode('\n'));
    return span;
  }

  // ---- live tool menu --------------------------------------------------
  function dots(name){ // dot-leader so the status pills line up in a column
    var col = 28, n = col - name.length; if(n < 3){ n = 3; }
    return ' ' + new Array(n + 1).join('.') + ' ';
  }
  var statusEls = {};   // id -> status <a>
  var latestById = {};  // id -> latest tool object (carries the fresh SSO token)

  function renderMenu(tools){
    statusEls = {};
    tools.forEach(function(t){
      var a = document.createElement('a');
      a.className = 'tool'; a.href = t.url; a.dataset.id = t.id;
      a.textContent = '> ' + t.name;
      out.appendChild(a);
      out.appendChild(document.createTextNode(dots(t.name)));
      var s = document.createElement('a');
      s.className = 'status st-wait'; s.href = t.url; s.textContent = '[ ...... ]';
      out.appendChild(s); out.appendChild(document.createTextNode('\n'));
      statusEls[t.id] = s;
      a.addEventListener('click', function(ev){ ev.preventDefault(); openTool(t); });
      s.addEventListener('click', function(ev){ ev.preventDefault(); openTool(t); });
    });
    out.appendChild(document.createTextNode('\n'));
    out.appendChild(makeCursor());
    paint(tools);
  }

  function makeCursor(){
    var c = document.createElement('span'); c.className = 'cursor'; return c;
  }

  function paint(tools){
    tools.forEach(function(t){
      latestById[t.id] = t;
      var s = statusEls[t.id]; if(!s) return;
      if(t.local){ s.className='status st-local';  s.textContent='[ LOCAL   ]'; }
      else if(t.up){ s.className='status st-online'; s.textContent='[ ONLINE  ]'; }
      else    { s.className='status st-offline';s.textContent='[ OFFLINE ]'; }
    });
  }

  function poll(){
    fetch('/api/status',{cache:'no-store'}).then(function(r){return r.json();})
      .then(function(d){ paint(d.tools||[]); }).catch(function(){});
  }

  function openTool(t){
    // The auth cookie is scoped to the apex domain, so it travels to every tool's
    // subdomain automatically — just navigate.
    if(t.url){ window.location.href = t.url; }
  }

  // ---- access gate + menu ----------------------------------------------
  function enter(){
    fetch('/api/status',{cache:'no-store'}).then(function(r){
      if(r.status === 401){ showAccessPrompt(); return null; }
      return r.json();
    }).then(function(d){
      if(!d) return;
      out.appendChild(document.createTextNode('\n'));
      line('WELCOME TO CENTRAL INDUSTRIAL. WE ARE THE FUTURE.');
      out.appendChild(document.createTextNode('\n'));
      renderMenu(d.tools||[]);
      setTimeout(poll, 700);
      pollTimer = setInterval(poll, 1500);
    }).catch(function(){ line('?DEVICE NOT PRESENT  ERROR', 'st-offline'); });
  }

  function showAccessPrompt(){
    out.appendChild(document.createTextNode('\n'));
    line('PROTECTED PROGRAM - ENTER ACCESS CODE:');
    out.appendChild(document.createTextNode('\n'));
    var wrap = document.createElement('span');
    wrap.appendChild(document.createTextNode('> '));
    var inp = document.createElement('input');
    inp.id = 'accode'; inp.type = 'password'; inp.autocomplete = 'off'; inp.spellcheck = false;
    // Grow the field to fit what's typed so the block cursor rides right after "> ".
    function sizeInput(){ inp.style.width = inp.value.length + 'ch'; }
    sizeInput();
    inp.addEventListener('input', sizeInput);
    wrap.appendChild(inp); wrap.appendChild(makeCursor());
    out.appendChild(wrap); out.appendChild(document.createTextNode('\n'));
    var msg = document.createElement('span'); out.appendChild(msg);
    inp.focus();
    setTimeout(function(){ inp.focus(); }, 0);   // make focus stick after insertion
    // Any click/keystroke on the screen drops the caret back on the prompt.
    document.addEventListener('click', function(){ inp.focus(); });
    document.addEventListener('keydown', function(){ if(document.activeElement !== inp) inp.focus(); });
    inp.addEventListener('keydown', function(ev){
      if(ev.key !== 'Enter') return; ev.preventDefault();
      var code = inp.value;
      fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},
            body: JSON.stringify({code: code})})
        .then(function(r){ return r.json().then(function(d){ return {ok: r.ok && d && d.ok}; }); })
        .then(function(res){
          if(res.ok){ wrap.remove(); msg.remove(); enter(); }
          else { msg.className = 'st-offline'; msg.textContent = '?ACCESS DENIED  ERROR';
                 inp.value = ''; sizeInput(); inp.focus(); }
        }).catch(function(){ msg.className = 'st-offline';
                 msg.textContent = '?DEVICE NOT PRESENT  ERROR'; });
    });
  }

  // ---- audio: play the short sample ONCE per tab-session ---------------
  // Auto-boot means there's no keypress gesture, so try to autoplay; if the
  // browser blocks it, fall back to the first user gesture. A sessionStorage
  // flag makes it play at most once — returning to the hub from a child tool
  // (same tab) won't replay it. New tab/window = fresh session = plays again.
  function playAudioOnce(){
    try { if(sessionStorage.getItem('sp_audio_played')) return; } catch(e){}
    var bgm = document.getElementById('bgm');
    if(!bgm) return;
    function mark(){ try { sessionStorage.setItem('sp_audio_played','1'); } catch(e){} }
    try { bgm.volume = 0.7; } catch(e){}
    var pr = bgm.play();
    if(pr && pr.then){
      pr.then(mark).catch(function(){
        var go = function(){
          try { if(sessionStorage.getItem('sp_audio_played')) return; } catch(e){}
          var p2 = bgm.play(); if(p2 && p2.then){ p2.then(mark).catch(function(){}); } else { mark(); }
        };
        window.addEventListener('keydown', go, {once:true});
        window.addEventListener('mousedown', go, {once:true});
        window.addEventListener('touchstart', go, {once:true, passive:true});
      });
    } else { mark(); }
  }

  // ---- boot sequence ---------------------------------------------------
  function boot(){
    if(booted) return; booted = true;
    playAudioOnce();
    var bc = document.getElementById('bootcur'); if(bc) bc.remove();
    if(hint) hint.remove();
    out.appendChild(document.createTextNode('\n'));

    var seq = [
      ['SEARCHING FOR SPECIAL PROJECTS', 180],
      ['LOADING', 520],
      ['READY.', 160],
      ['', 120]
    ];
    var i = 0;
    (function step(){
      if(i < seq.length){
        line(seq[i][0]);
        var d = seq[i][1]; i++;
        setTimeout(step, d);
      } else {
        enter();   // check auth → show the access-code prompt or draw the live menu
      }
    })();
  }

  // Boot on the first user gesture (key or click). Required so the browser allows
  // the music to play — autoplay-with-sound is blocked until the user interacts.
  // This is the C64 "press any key" flow: first input → looping music + live menu.
  window.addEventListener('keydown', boot, {once:true});
  window.addEventListener('pointerdown', boot, {once:true});
})();
</script>
</body>
</html>
